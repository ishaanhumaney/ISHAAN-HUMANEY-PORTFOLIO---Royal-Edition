name: Code Quality & Linting

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  lint:
    name: Validate & Format Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linting Tools
        run: |
          npm install -g prettier htmlhint eslint stylelint stylelint-config-standard

      - name: Check Formatting (Prettier)
        run: npx prettier --check "**/*.{html,css,js,md}"

      - name: Lint HTML Files
        run: npx htmlhint "**/*.html"

      - name: Lint JavaScript (ESLint)
        run: npx eslint script.js --no-eslintrc --env-browser --env-es2021

      - name: Lint CSS (Stylelint)
        run: npx stylelint style.css --config '{"extends": "stylelint-config-standard"}'
